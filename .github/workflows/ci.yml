name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test (gfortran)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install gfortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran make

      - name: Report compiler version
        run: gfortran --version

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Run test suite
        run: make check

      - name: Verify test results
        run: ./testcheck.sh

      - name: Upload failure details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: |
            check.out
            */test/failed.out
          if-no-files-found: ignore
